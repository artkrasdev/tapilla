<svg class="noise-overlay" xmlns="http://www.w3.org/2000/svg" focusable="false">
    <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="2"></feTurbulence>
        <feColorMatrix type="saturate" values="0"></feColorMatrix>
        <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0 0 1 1"></feFuncA>
        </feComponentTransfer>
    </filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)"></rect>
</svg>